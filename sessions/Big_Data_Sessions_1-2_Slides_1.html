<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Big Data Analytics — Sessions 1 &amp; 2 (Slides)</title>
<style>
  :root{
    --navy:#07111F; --navy2:#0E1C30; --panel:#12233B;
    --cyan:#2E8BC0; --cyan-lt:#AEE3F5; --gold:#C08A2E; --gold-lt:#E4B75A;
    --red:#E0534B; --green:#3FBF8F; --ink:#EAF2FA; --soft:#93A8C0; --line:#22364f;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#04080f;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  /* deck viewport */
  .deck{position:fixed;inset:0;overflow:hidden}
  .slide{
    position:absolute;inset:0;display:none;flex-direction:column;
    padding:4vh 6vw 5vh;
    background:radial-gradient(1100px 620px at 74% -12%, #14263e 0%, var(--navy) 58%);
    color:var(--ink);
  }
  .slide.active{display:flex;animation:fade .35s ease}
  @keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}

  /* top strip */
  .strip{position:absolute;top:0;left:0;right:0;height:8px;background:var(--navy);border-bottom:2px solid var(--cyan)}
  .eyebrow{color:var(--cyan-lt);font-size:1.5vw;font-weight:800;letter-spacing:.18vw;text-transform:uppercase;margin-bottom:1.1vh}
  .eyebrow .sec{color:var(--gold-lt)}
  h1{font-size:4.6vw;line-height:1.04;font-weight:850;letter-spacing:-.5px}
  h1.big{font-size:6.6vw}
  h2{font-size:3.5vw;line-height:1.06;font-weight:800;margin-bottom:.6vh}
  h2 .accent,h1 .accent{color:var(--gold-lt)}
  .lede{color:var(--soft);font-size:1.85vw;line-height:1.32;margin-top:1.2vh;max-width:56ch;font-weight:500}
  .rule{width:7vw;height:5px;background:var(--gold);border-radius:3px;margin:2.4vh 0}

  ul.pts{list-style:none;margin-top:2.2vh}
  ul.pts li{
    font-size:2.05vw;line-height:1.28;margin-bottom:1.5vh;padding-left:2vw;position:relative;
    color:#dbe7f4;max-width:56ch
  }
  ul.pts li::before{content:"";position:absolute;left:2px;top:.9vw;width:.9vw;height:.9vw;border-radius:3px;
    background:var(--cyan);transform:rotate(45deg)}
  ul.pts li b{color:#fff;font-weight:750}
  ul.pts.small li{font-size:1.9vw;margin-bottom:1.2vh}

  .lead-hl{color:var(--gold-lt);font-weight:800}
  code{font-family:"SF Mono",Menlo,Consolas,monospace;background:#0a1626;border:1px solid var(--line);
    border-radius:6px;padding:2px 8px;font-size:.9em;color:var(--cyan-lt)}

  /* takeaway / discuss / board */
  .box{margin-top:auto;border-radius:16px;padding:2vh 1.8vw;font-size:1.85vw;line-height:1.34;font-weight:700}
  .box .lab{display:block;font-size:1.35vw;letter-spacing:.15vw;text-transform:uppercase;margin-bottom:1vh;font-weight:800}
  .box.take{background:rgba(46,139,192,.14);border-left:5px solid var(--cyan)}
  .box.take .lab{color:var(--cyan-lt)}
  .box.take{color:#eaf4fb}
  .box.board{background:var(--navy2);border-left:5px solid var(--gold);color:#eef4fa}
  .box.board .lab{color:var(--gold-lt)}
  .box.discuss{background:rgba(192,138,46,.13);border-left:5px solid var(--gold);color:#f4e7d3}
  .box.discuss .lab{color:var(--gold-lt)}
  .box .subtxt{display:block;font-size:1.5vw;font-weight:500;color:var(--soft);margin-top:1.2vh}

  /* two-column */
  .cols{display:grid;grid-template-columns:1fr 1fr;gap:3.5vw;margin-top:3vh;flex:1}
  .col h3{font-size:1.7vw;color:var(--gold-lt);text-transform:uppercase;letter-spacing:.12vw;margin-bottom:2vh;font-weight:800}
  .col ul{list-style:none}
  .col li{font-size:1.95vw;line-height:1.28;margin-bottom:1.6vh;padding-left:1.6vw;position:relative;color:#d5e3f2}
  .col li::before{content:"›";position:absolute;left:2px;color:var(--cyan);font-weight:800}

  /* data table */
  table{width:100%;border-collapse:collapse;margin-top:2vh;font-size:1.75vw}
  th{background:var(--navy2);color:var(--cyan-lt);text-align:left;padding:1.1vh 1.1vw;font-weight:800;font-size:1.45vw;
    text-transform:uppercase;letter-spacing:1px;border-bottom:2px solid var(--cyan)}
  td{padding:1.1vh 1.1vw;border-bottom:1px solid var(--line);color:#d8e5f3;vertical-align:top}
  tr:nth-child(even) td{background:rgba(255,255,255,.02)}
  td b{color:#fff}
  .peak td{background:rgba(192,138,46,.14)!important}
  .peak td:first-child{color:var(--gold-lt);font-weight:800}

  /* generation timeline chips */
  .gens{display:flex;gap:0;margin-top:30px;align-items:stretch}
  .gen{flex:1;background:var(--panel);border:1px solid var(--line);padding:2.6vh 1.8vw;position:relative}
  .gen:first-child{border-radius:12px 0 0 12px}
  .gen:last-child{border-radius:0 12px 12px 0}
  .gen .gt{font-size:1.5vw;color:var(--gold-lt);font-weight:800;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
  .gen .gd{font-size:1.9vw;color:#dbe7f4;line-height:1.3}
  .gen .yr{font-size:1.3vw;color:var(--soft);margin-top:10px}
  .gen.brk{border-color:var(--red)}
  .gen.brk .gt{color:var(--red)}
  .arrow{display:flex;align-items:center;color:var(--soft);font-size:26px;padding:0 6px}

  /* section divider slide */
  .divider{justify-content:center;align-items:flex-start;
    background:linear-gradient(120deg,#0a1a2e 0%,var(--navy) 60%)}
  .divider .eyebrow{font-size:1.7vw}
  .divider h1{font-size:7vw}
  .divider .part{color:var(--soft);font-size:2.6vw;margin-top:2.4vh;font-weight:500;max-width:44ch}

  /* cover */
  .cover{justify-content:center;background:linear-gradient(150deg,#0b1d33 0%,#04080f 70%)}
  .cover .brand{font-size:1.6vw;letter-spacing:.2vw;color:var(--cyan-lt);font-weight:800;text-transform:uppercase;margin-bottom:20px}
  .cover h1{font-size:7.4vw;line-height:.98}
  .cover .cs{font-size:3vw;color:var(--cyan);margin-top:10px;font-weight:600}
  .cover .meta{margin-top:5vh;color:var(--soft);font-size:2vw;line-height:1.7}
  .cover .meta b{color:#dbe7f4;font-weight:700}

  /* footer / chrome */
  .foot{position:absolute;bottom:2.8vh;left:6vw;right:6vw;display:flex;justify-content:space-between;
    align-items:center;color:var(--soft);font-size:13px;letter-spacing:.4px}
  .foot{font-size:1.25vw}
  .foot .brandf{font-weight:700;color:#7d94ad}
  .pnum{font-weight:800;color:var(--gold-lt)}


  .figure{margin-top:24px;display:flex;justify-content:center;align-items:center}
  .figure svg{width:100%;max-width:52vw;height:auto}
  .split{display:grid;grid-template-columns:1fr 1fr;gap:3vw;align-items:center;flex:1}
  .split .fig-side{display:flex;align-items:center;justify-content:center}
  .split .fig-side svg{width:100%;max-width:40vw;height:auto}
  @media(max-width:900px){.split{grid-template-columns:1fr}}


  .figure.fig-compact svg{max-width:46vw}
  .split{margin-top:20px}
  .split .fig-side svg{max-width:40vw}
  /* when a slide has cols AND a diagram, shrink cols spacing */


  .figure svg{max-height:46vh}
  .figure.fig-compact svg{max-height:40vh}
  .split .fig-side svg{max-height:52vh}
  /* slide-5 style: make the storage-stack figure sit beside the lede, not below */

  /* progress bar */
  .pbar{position:absolute;bottom:0;left:0;height:4px;background:var(--gold);transition:width .3s}

  /* nav hint + controls */
  .ctrl{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:20;opacity:.28;transition:.2s}
  .ctrl:hover{opacity:1}
  .ctrl button{background:var(--panel);border:1px solid var(--line);color:var(--ink);border-radius:8px;
    padding:7px 12px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600}
  .ctrl button:hover{border-color:var(--cyan)}

  .hintbar{position:fixed;top:16px;right:20px;color:#4d647d;font-size:12px;z-index:20}
  @media print{.ctrl,.hintbar{display:none}}
</style>
</head>
<body>
<div class="strip"></div>
<div class="deck" id="deck"></div>

<div class="hintbar">← → navigate · F fullscreen · O overview</div>
<div class="ctrl">
  <button onclick="go(-1)">← Prev</button>
  <button onclick="toggleFull()">⤢ Full</button>
  <button onclick="go(1)">Next →</button>
</div>

<script>
/* ---- custom diagrams ---- */
const SVGS = {"bigdata": "<svg viewBox=\"0 0 520 320\" xmlns=\"http://www.w3.org/2000/svg\">\n<defs><linearGradient id=\"g1\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\">\n<stop offset=\"0\" stop-color=\"#2E8BC0\"/><stop offset=\"1\" stop-color=\"#E4B75A\"/></linearGradient></defs>\n<!-- three stacked capability bars, each with a crack -->\n<g font-family=\"Helvetica\" font-weight=\"700\">\n<rect x=\"30\" y=\"30\" width=\"460\" height=\"66\" rx=\"12\" fill=\"#12233B\" stroke=\"#22364f\"/>\n<text x=\"52\" y=\"60\" fill=\"#AEE3F5\" font-size=\"17\">STORE</text>\n<text x=\"52\" y=\"82\" fill=\"#8FA9C2\" font-size=\"13\" font-weight=\"400\">one machine is full</text>\n<text x=\"360\" y=\"72\" fill=\"#E4B75A\" font-size=\"18\">HDFS</text>\n<path d=\"M300 30 l-10 30 l14 6 l-10 30\" stroke=\"#E0534B\" stroke-width=\"3\" fill=\"none\"/>\n<rect x=\"30\" y=\"122\" width=\"460\" height=\"66\" rx=\"12\" fill=\"#12233B\" stroke=\"#22364f\"/>\n<text x=\"52\" y=\"152\" fill=\"#AEE3F5\" font-size=\"17\">MOVE</text>\n<text x=\"52\" y=\"174\" fill=\"#8FA9C2\" font-size=\"13\" font-weight=\"400\">data always hours old</text>\n<text x=\"352\" y=\"164\" fill=\"#E4B75A\" font-size=\"18\">KAFKA</text>\n<path d=\"M300 122 l-10 30 l14 6 l-10 30\" stroke=\"#E0534B\" stroke-width=\"3\" fill=\"none\"/>\n<rect x=\"30\" y=\"214\" width=\"460\" height=\"66\" rx=\"12\" fill=\"#12233B\" stroke=\"#22364f\"/>\n<text x=\"52\" y=\"244\" fill=\"#AEE3F5\" font-size=\"17\">PROCESS</text>\n<text x=\"52\" y=\"266\" fill=\"#8FA9C2\" font-size=\"13\" font-weight=\"400\">100k queries at once</text>\n<text x=\"360\" y=\"256\" fill=\"#E4B75A\" font-size=\"18\">SPARK</text>\n<path d=\"M300 214 l-10 30 l14 6 l-10 30\" stroke=\"#E0534B\" stroke-width=\"3\" fill=\"none\"/>\n</g></svg>", "datasystem": "<svg viewBox=\"0 0 520 300\" xmlns=\"http://www.w3.org/2000/svg\">\n<g font-family=\"Helvetica\">\n<!-- user -->\n<circle cx=\"70\" cy=\"150\" r=\"30\" fill=\"#12233B\" stroke=\"#2E8BC0\" stroke-width=\"2\"/>\n<circle cx=\"70\" cy=\"140\" r=\"10\" fill=\"#AEE3F5\"/><path d=\"M52 168 a18 14 0 0 1 36 0\" fill=\"#AEE3F5\"/>\n<text x=\"70\" y=\"215\" fill=\"#8FA9C2\" font-size=\"13\" text-anchor=\"middle\">you</text>\n<!-- ask what arrow -->\n<path d=\"M108 132 H210\" stroke=\"#2E8BC0\" stroke-width=\"2.5\" marker-end=\"url(#a)\"/>\n<text x=\"158\" y=\"122\" fill=\"#AEE3F5\" font-size=\"13\" text-anchor=\"middle\" font-weight=\"700\">ask \"what\"</text>\n<!-- system box -->\n<rect x=\"215\" y=\"95\" width=\"150\" height=\"110\" rx=\"16\" fill=\"#0E1C30\" stroke=\"#E4B75A\" stroke-width=\"2\"/>\n<text x=\"290\" y=\"140\" fill=\"#fff\" font-size=\"19\" text-anchor=\"middle\" font-weight=\"800\">data</text>\n<text x=\"290\" y=\"164\" fill=\"#fff\" font-size=\"19\" text-anchor=\"middle\" font-weight=\"800\">system</text>\n<text x=\"290\" y=\"192\" fill=\"#8FA9C2\" font-size=\"11\" text-anchor=\"middle\">decides \"how\"</text>\n<!-- return arrow -->\n<path d=\"M210 176 H108\" stroke=\"#E4B75A\" stroke-width=\"2.5\" marker-end=\"url(#a)\"/>\n<text x=\"158\" y=\"196\" fill=\"#E4B75A\" font-size=\"13\" text-anchor=\"middle\" font-weight=\"700\">answer</text>\n<!-- storage cylinders -->\n<g fill=\"#12233B\" stroke=\"#22364f\" stroke-width=\"1.5\">\n<ellipse cx=\"425\" cy=\"120\" rx=\"26\" ry=\"9\"/><rect x=\"399\" y=\"120\" width=\"52\" height=\"34\" fill=\"#12233B\" stroke=\"none\"/>\n<path d=\"M399 120 v34 M451 120 v34\" stroke=\"#22364f\"/><ellipse cx=\"425\" cy=\"154\" rx=\"26\" ry=\"9\"/>\n<ellipse cx=\"425\" cy=\"175\" rx=\"26\" ry=\"9\"/><rect x=\"399\" y=\"175\" width=\"52\" height=\"24\" fill=\"#12233B\" stroke=\"none\"/>\n<path d=\"M399 175 v24 M451 175 v24\" stroke=\"#22364f\"/><ellipse cx=\"425\" cy=\"199\" rx=\"26\" ry=\"9\"/></g>\n<path d=\"M367 150 H396\" stroke=\"#2E8BC0\" stroke-width=\"2\" marker-end=\"url(#a)\"/>\n<text x=\"425\" y=\"230\" fill=\"#8FA9C2\" font-size=\"11\" text-anchor=\"middle\">storage</text>\n<defs><marker id=\"a\" markerWidth=\"9\" markerHeight=\"9\" refX=\"7\" refY=\"4.5\" orient=\"auto\">\n<path d=\"M0 0 L9 4.5 L0 9 z\" fill=\"#8FA9C2\"/></marker></defs>\n</g></svg>", "hwgap": "<svg viewBox=\"0 0 520 300\" xmlns=\"http://www.w3.org/2000/svg\">\n<g font-family=\"Helvetica\">\n<line x1=\"60\" y1=\"250\" x2=\"480\" y2=\"250\" stroke=\"#22364f\" stroke-width=\"1.5\"/>\n<line x1=\"60\" y1=\"250\" x2=\"60\" y2=\"40\" stroke=\"#22364f\" stroke-width=\"1.5\"/>\n<text x=\"270\" y=\"285\" fill=\"#8FA9C2\" font-size=\"13\" text-anchor=\"middle\">time \u2192</text>\n<text x=\"30\" y=\"150\" fill=\"#8FA9C2\" font-size=\"13\" text-anchor=\"middle\" transform=\"rotate(-90 30 150)\">speed \u2192</text>\n<!-- compute: steep -->\n<path d=\"M60 250 Q 250 235 470 60\" stroke=\"#E4B75A\" stroke-width=\"3.5\" fill=\"none\"/>\n<text x=\"415\" y=\"72\" fill=\"#E4B75A\" font-size=\"15\" font-weight=\"700\">compute</text>\n<!-- data movement: flat -->\n<path d=\"M60 250 Q 250 232 470 200\" stroke=\"#2E8BC0\" stroke-width=\"3.5\" fill=\"none\"/>\n<text x=\"392\" y=\"192\" fill=\"#AEE3F5\" font-size=\"15\" font-weight=\"700\">data movement</text>\n<!-- gap bracket -->\n<line x1=\"470\" y1=\"60\" x2=\"470\" y2=\"200\" stroke=\"#E0534B\" stroke-width=\"2\" stroke-dasharray=\"4 4\"/>\n<text x=\"486\" y=\"135\" fill=\"#E0534B\" font-size=\"13\" font-weight=\"700\" transform=\"rotate(90 486 135)\">the gap</text>\n</g></svg>", "gens": "<svg viewBox=\"0 0 900 150\" xmlns=\"http://www.w3.org/2000/svg\">\n<g font-family=\"Helvetica\">\n<line x1=\"40\" y1=\"80\" x2=\"860\" y2=\"80\" stroke=\"#22364f\" stroke-width=\"2\"/>\n<!-- gen1 -->\n<circle cx=\"150\" cy=\"80\" r=\"10\" fill=\"#2E8BC0\"/><text x=\"150\" y=\"50\" fill=\"#E4B75A\" font-size=\"16\" font-weight=\"800\" text-anchor=\"middle\">Gen 1</text>\n<text x=\"150\" y=\"112\" fill=\"#8FA9C2\" font-size=\"12\" text-anchor=\"middle\">pre-2014 \u00b7 GB</text>\n<text x=\"150\" y=\"128\" fill=\"#93A8C0\" font-size=\"11\" text-anchor=\"middle\">MySQL + Vertica</text>\n<!-- gen2 -->\n<circle cx=\"450\" cy=\"80\" r=\"10\" fill=\"#2E8BC0\"/><text x=\"450\" y=\"50\" fill=\"#E4B75A\" font-size=\"16\" font-weight=\"800\" text-anchor=\"middle\">Gen 2</text>\n<text x=\"450\" y=\"112\" fill=\"#8FA9C2\" font-size=\"12\" text-anchor=\"middle\">2014\u201317 \u00b7 PB \u00b7 24 hr</text>\n<text x=\"450\" y=\"128\" fill=\"#93A8C0\" font-size=\"11\" text-anchor=\"middle\">Hadoop + HDFS + Parquet</text>\n<!-- gen3 -->\n<circle cx=\"770\" cy=\"80\" r=\"12\" fill=\"#E4B75A\"/><text x=\"770\" y=\"50\" fill=\"#E4B75A\" font-size=\"16\" font-weight=\"800\" text-anchor=\"middle\">Gen 3</text>\n<text x=\"770\" y=\"112\" fill=\"#8FA9C2\" font-size=\"12\" text-anchor=\"middle\">2017+ \u00b7 100+ PB \u00b7 30 min</text>\n<text x=\"770\" y=\"128\" fill=\"#93A8C0\" font-size=\"11\" text-anchor=\"middle\">+ Kafka + Hudi</text>\n<!-- latency shrink arrows -->\n<path d=\"M180 80 H420\" stroke=\"#2E8BC0\" stroke-width=\"1.5\" marker-end=\"url(#ar)\"/>\n<path d=\"M480 80 H740\" stroke=\"#E4B75A\" stroke-width=\"1.5\" marker-end=\"url(#ar)\"/>\n<defs><marker id=\"ar\" markerWidth=\"9\" markerHeight=\"9\" refX=\"7\" refY=\"4.5\" orient=\"auto\"><path d=\"M0 0 L9 4.5 L0 9z\" fill=\"#8FA9C2\"/></marker></defs>\n</g></svg>", "hdfs": "<svg viewBox=\"0 0 520 300\" xmlns=\"http://www.w3.org/2000/svg\">\n<g font-family=\"Helvetica\">\n<!-- file splits into blocks -->\n<rect x=\"30\" y=\"30\" width=\"120\" height=\"40\" rx=\"6\" fill=\"#0E1C30\" stroke=\"#2E8BC0\"/>\n<text x=\"90\" y=\"55\" fill=\"#AEE3F5\" font-size=\"13\" text-anchor=\"middle\" font-weight=\"700\">big file</text>\n<g fill=\"#2E8BC0\"><rect x=\"30\" y=\"90\" width=\"34\" height=\"26\" rx=\"4\"/><rect x=\"73\" y=\"90\" width=\"34\" height=\"26\" rx=\"4\"/><rect x=\"116\" y=\"90\" width=\"34\" height=\"26\" rx=\"4\"/></g>\n<text x=\"90\" y=\"132\" fill=\"#8FA9C2\" font-size=\"11\" text-anchor=\"middle\">128 MB blocks</text>\n<path d=\"M90 72 V88\" stroke=\"#22364f\" stroke-width=\"1.5\" marker-end=\"url(#h)\"/>\n<!-- three datanodes each with replicas -->\n<g font-weight=\"700\">\n<rect x=\"210\" y=\"40\" width=\"90\" height=\"70\" rx=\"8\" fill=\"#12233B\" stroke=\"#22364f\"/><text x=\"255\" y=\"30\" fill=\"#8FA9C2\" font-size=\"12\" text-anchor=\"middle\">DataNode 1</text>\n<rect x=\"330\" y=\"40\" width=\"90\" height=\"70\" rx=\"8\" fill=\"#12233B\" stroke=\"#22364f\"/><text x=\"375\" y=\"30\" fill=\"#8FA9C2\" font-size=\"12\" text-anchor=\"middle\">DataNode 2</text>\n<rect x=\"330\" y=\"160\" width=\"90\" height=\"70\" rx=\"8\" fill=\"#12233B\" stroke=\"#22364f\"/><text x=\"375\" y=\"150\" fill=\"#8FA9C2\" font-size=\"12\" text-anchor=\"middle\">DataNode 3</text>\n<rect x=\"210\" y=\"160\" width=\"90\" height=\"70\" rx=\"8\" fill=\"#12233B\" stroke=\"#22364f\"/><text x=\"255\" y=\"150\" fill=\"#8FA9C2\" font-size=\"12\" text-anchor=\"middle\">DataNode 4</text>\n</g>\n<!-- one block replicated 3x (highlight) -->\n<rect x=\"225\" y=\"60\" width=\"26\" height=\"20\" rx=\"3\" fill=\"#E4B75A\"/>\n<rect x=\"345\" y=\"60\" width=\"26\" height=\"20\" rx=\"3\" fill=\"#E4B75A\"/>\n<rect x=\"345\" y=\"180\" width=\"26\" height=\"20\" rx=\"3\" fill=\"#E4B75A\"/>\n<!-- other blocks -->\n<rect x=\"262\" y=\"60\" width=\"26\" height=\"20\" rx=\"3\" fill=\"#2E8BC0\"/>\n<rect x=\"383\" y=\"60\" width=\"26\" height=\"20\" rx=\"3\" fill=\"#2E8BC0\"/>\n<rect x=\"225\" y=\"180\" width=\"26\" height=\"20\" rx=\"3\" fill=\"#2E8BC0\"/>\n<text x=\"315\" y=\"255\" fill=\"#E4B75A\" font-size=\"12\" text-anchor=\"middle\" font-weight=\"700\">gold block: replicated 3\u00d7 across nodes</text>\n<defs><marker id=\"h\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"4\" orient=\"auto\"><path d=\"M0 0 L8 4 L0 8z\" fill=\"#8FA9C2\"/></marker></defs>\n</g></svg>", "batch": "<svg viewBox=\"0 0 520 260\" xmlns=\"http://www.w3.org/2000/svg\">\n<g font-family=\"Helvetica\">\n<text x=\"130\" y=\"30\" fill=\"#E4B75A\" font-size=\"15\" font-weight=\"800\" text-anchor=\"middle\">BATCH</text>\n<!-- batch: accumulate then one big block -->\n<g fill=\"#2E8BC0\"><circle cx=\"60\" cy=\"80\" r=\"7\"/><circle cx=\"85\" cy=\"80\" r=\"7\"/><circle cx=\"110\" cy=\"80\" r=\"7\"/><circle cx=\"135\" cy=\"80\" r=\"7\"/><circle cx=\"160\" cy=\"80\" r=\"7\"/></g>\n<rect x=\"55\" y=\"120\" width=\"120\" height=\"34\" rx=\"6\" fill=\"#12233B\" stroke=\"#2E8BC0\"/>\n<text x=\"115\" y=\"142\" fill=\"#AEE3F5\" font-size=\"12\" text-anchor=\"middle\">process all at once</text>\n<text x=\"115\" y=\"180\" fill=\"#8FA9C2\" font-size=\"11\" text-anchor=\"middle\">cheap \u00b7 delayed</text>\n<line x1=\"255\" y1=\"20\" x2=\"255\" y2=\"200\" stroke=\"#22364f\" stroke-width=\"1.5\"/>\n<text x=\"390\" y=\"30\" fill=\"#E4B75A\" font-size=\"15\" font-weight=\"800\" text-anchor=\"middle\">STREAMING</text>\n<!-- streaming: each dot flows straight through -->\n<g fill=\"#E4B75A\"><circle cx=\"300\" cy=\"80\" r=\"7\"/><circle cx=\"340\" cy=\"80\" r=\"7\"/><circle cx=\"380\" cy=\"80\" r=\"7\"/><circle cx=\"420\" cy=\"80\" r=\"7\"/><circle cx=\"460\" cy=\"80\" r=\"7\"/></g>\n<path d=\"M300 100 V150 M340 100 V150 M380 100 V150 M420 100 V150 M460 100 V150\" stroke=\"#E4B75A\" stroke-width=\"1.5\" marker-end=\"url(#s)\"/>\n<text x=\"380\" y=\"180\" fill=\"#8FA9C2\" font-size=\"11\" text-anchor=\"middle\">act while alive \u00b7 immediate</text>\n<defs><marker id=\"s\" markerWidth=\"8\" markerHeight=\"8\" refX=\"6\" refY=\"6\" orient=\"auto\"><path d=\"M0 0 L8 4 L0 8z\" fill=\"#E4B75A\"/></marker></defs>\n</g></svg>", "chain": "<svg viewBox=\"0 0 560 520\" xmlns=\"http://www.w3.org/2000/svg\"><g font-family=\"Helvetica\"><rect x=\"30\" y=\"20\" width=\"500\" height=\"78\" rx=\"12\" fill=\"#0d2033\" stroke=\"2E8BC0\" stroke-width=\"2.5\"/><circle cx=\"66\" cy=\"59\" r=\"17\" fill=\"2E8BC0\"/><text x=\"66\" y=\"66\" font-size=\"19\" fill=\"#07111F\" text-anchor=\"middle\" font-weight=\"800\">1</text><text x=\"98\" y=\"55\" font-size=\"20\" fill=\"#EAF2FA\" font-weight=\"700\">HDFS can\u2019t update a row in place</text><text x=\"98\" y=\"80\   let out='<div class="gens">';
  gens.forEach((g,i)=>{
    const brk = g.t==='Gen 2' ? '' : '';
    out+=`<div class="gen"><div class="gt">${g.t}</div><div class="gd">${g.d}</div><div class="yr">${g.yr}</div></div>`;
    if(i<gens.length-1) out+='<div class="arrow">→</div>';
  });
  return out+'</div>';
}
function boxHTML(b){
  const sub = b.s ? `<span class="subtxt">${b.s}</span>` : '';
  return `<div class="box ${b.k}"><span class="lab">${b.lab}</span>${b.t}${sub}</div>`;
}

slides.forEach((s,idx)=>{
  const el=document.createElement('section');
  el.className='slide'+(s.type?(' '+s.type):'');
  let inner='';

  if(s.type==='cover'){
    inner = s.html;
  } else if(s.type==='divider'){
    inner = `<div class="eyebrow"><span class="sec">${s.eyebrow[0]}</span> &nbsp;·&nbsp; ${s.eyebrow[1]}</div>
             <h1>${s.dtitle}</h1><div class="part">${s.part}</div>`;
  } else {
    if(s.eyebrow) inner += `<div class="eyebrow"><span class="sec">${s.eyebrow[0]}</span> &nbsp;·&nbsp; ${s.eyebrow[1]}</div>`;
    if(s.title)   inner += `<h2>${s.title}</h2>`;
    if(s.lede)    inner += `<div class="lede">${s.lede}</div>`;
    const hasFig = s.svg && SVGS[s.svg];
    // pts + figure  ->  side-by-side split (text left, diagram right)
    if(s.pts && hasFig){
      inner += `<div class="split"><div><ul class="pts${s.pts.length>4?' small':''}">${s.pts.map(p=>`<li>${p}</li>`).join('')}</ul></div><div class="fig-side">${SVGS[s.svg]}</div></div>`;
    } else if(s.pts){
      inner += `<ul class="pts${s.pts.length>4?' small':''}">${s.pts.map(p=>`<li>${p}</li>`).join('')}</ul>`;
    } else if(hasFig && !s.cols && !s.table){
      // lede-only slide with a figure: pull lede into a left column beside the diagram
      // (lede was already appended above; move it into split)
      inner = inner.replace(/<div class="lede">([\s\S]*?)<\/div>/, '');
      inner += `<div class="split"><div><div class="lede">${s.lede||''}</div></div><div class="fig-side">${SVGS[s.svg]}</div></div>`;
      s.__figdone = true;
    }
    // cols + figure -> figure sits centered under a slightly tighter cols (cols read fast)
    if(s.cols)    inner += colsHTML(s.cols);
    if(s.table)   inner += tableHTML(s.table);
    if(s.gens)    inner += gensHTML(s.gens);
    // lede-only or cols + figure (no pts consumed above) -> centered figure, sized down
    if(hasFig && !s.pts && !s.__figdone){
      inner += `<div class="figure${s.cols?' fig-compact':''}">${SVGS[s.svg]}</div>`;
    }
    if(s.box)     inner += boxHTML(s.box);

  }

  // footer chrome (not on cover)
  if(s.type!=='cover'){
    inner += `<div class="foot"><span class="brandf">${FOOT}</span><span class="pnum">${String(idx+1).padStart(2,'0')} / ${String(slides.length).padStart(2,'0')}</span></div>`;
  }
  inner += `<div class="pbar" style="width:${((idx+1)/slides.length*100)}%"></div>`;
  el.innerHTML = inner;
  deck.appendChild(el);
});

/* ---- navigation ---- */
let cur=0;
const all=[...document.querySelectorAll('.slide')];
function show(n){
  cur=Math.max(0,Math.min(all.length-1,n));
  all.forEach((s,i)=>s.classList.toggle('active',i===cur));
  location.hash = cur+1;
}
function go(d){ show(cur+d); }
function toggleFull(){
  if(!document.fullscreenElement) document.documentElement.requestFullscreen();
  else document.exitFullscreen();
}
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '||e.key==='PageDown'){e.preventDefault();go(1);}
  else if(e.key==='ArrowLeft'||e.key==='PageUp'){e.preventDefault();go(-1);}
  else if(e.key==='Home'){show(0);}
  else if(e.key==='End'){show(all.length-1);}
  else if(e.key.toLowerCase()==='f'){toggleFull();}
  else if(/^[0-9]$/.test(e.key)){/* reserved */}
});
// swipe (touch)
let tx=0;
document.addEventListener('touchstart',e=>tx=e.touches[0].clientX);
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  if(Math.abs(dx)>50) go(dx<0?1:-1);
});
// deep-link
const h=parseInt(location.hash.replace('#',''));
show(isNaN(h)?0:h-1);
</script>
